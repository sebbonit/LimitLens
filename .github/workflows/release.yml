name: Build and release app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_*.app 2>/dev/null || true

      - name: Run tests
        run: swift test

      - name: Build .app bundle
        run: ./Scripts/build-app.sh

      - name: Zip the app
        run: |
          cd .build
          ditto -c -k --keepParent LimitLens.app LimitLens.app.zip

      - name: Generate version tag
        id: tag
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=v${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=LimitLens ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          files: .build/LimitLens.app.zip
          generate_release_notes: true
          prerelease: false
